version: 2
updates:
  # Dependencias pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Caracas"
    open-pull-requests-limit: 5
    # Solo seguridad + prod deps (evitar noise de devDeps menores)
    groups:
      prod-minor:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev-patch:
        dependency-type: "development"
        update-types: ["patch"]
    ignore:
      # xlsx tiene vulnerabilidad sin fix upstream — migración a exceljs planificada
      - dependency-name: "xlsx"
        update-types: ["version-update:semver-patch"]
      # eslint-plugin-react no es compatible con ESLint 10 todavía
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      # v6 no existe para estas actions — latest es v4
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      # v3 no existe para softprops/action-gh-release — latest es v2
      - dependency-name: "softprops/action-gh-release"
        update-types: ["version-update:semver-major"]
